<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication UI</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle, rgba(63,94,251,1) 0%, rgba(252,70,107,1) 100%);
        }
        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            overflow: hidden;
            background: white;
        }
        .image-section, .form-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .image-section {
            background: url('https://via.placeholder.com/600') center / cover no-repeat;
        }
        .form-section {
            flex-direction: column;
        }
        .form-section form {
            display: flex;
            flex-direction: column;
            width: 80%;
            max-width: 300px;
        }
        .form-section input {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.1);
        }
        .form-section button {
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .form-section a {
            text-align: center;
            color: #4CAF50;
            text-decoration: none;
            margin-bottom: 10px;
        }
        .google-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #dd4b39;
            color: white;
        }
        .google-btn img {
            margin-right: 10px;
            height: 20px;
            width: 20px;
        }
        .form-title {
            font-size: 24px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-section"></div>
        <div class="form-section">
            <div class="form-title">Sign In</div>
            <form>
                <input type="email" placeholder="Email">
                <input type="password" placeholder="Password">
                <button type="button">Login</button>
                <a href="#">Forgot password?</a>
                <div class="form-title">New User?</div>
                <input type="text" placeholder="Full Name">
                <input type="email" placeholder="Email">
                <input type="password" placeholder="Password">
                <input type="password" placeholder="Confirm Password">
                <input type="checkbox" id="remember"><label for="remember">Remember me</label>
                <button type="button">Register</button>
                <button type="button" class="google-btn"><img src="https://via.placeholder.com/20" alt="Google"> Login with Google</button>
            </form>
        </div>
    </div>
</body>
</html>
