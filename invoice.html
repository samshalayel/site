<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاتورة معدات حاسوب</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
        }
        .invoice {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .company-info {
            text-align: center;
        }
        .company-info h2 {
            margin: 5px 0;
        }
        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f4f4f9;
            color: #333;
        }
        .total {
            text-align: right;
            margin-top: 20px;
        }
        .total span {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="invoice">
        <div class="company-info">
            <h2>اسم الشركة</h2>
            <p>هاتف: 123456789</p>
            <p>بريد: company@example.com</p>
            <p>عنوان: 1234 شارع رئيسي، مدينة، دولة</p>
            <p>التاريخ: <span id="invoiceDate">01/01/2022</span></p>
        </div>

        <table id="invoiceTable">
            <thead>
                <tr>
                    <th>كود</th>
                    <th>صنف</th>
                    <th>فئة</th>
                    <th>كمية</th>
                    <th>سعر الوحدة</th>
                    <th>الإجمالي</th>
                </tr>
            </thead>
            <tbody>
                <!-- Dynamic rows will go here -->
            </tbody>
        </table>

        <div class="total">
            الإجمالي الكلي: <span id="totalAmount">0</span> دينار
        </div>
    </div>

    <script>
        const categories = ['شاشة', 'طابعة', 'لابتوب', 'ماوس'];
        const invoiceTable = document.getElementById('invoiceTable').getElementsByTagName('tbody')[0];
        let invoiceData = JSON.parse(localStorage.getItem('invoiceData')) || [];

        function createRow(item = {code: '', name: '', category: '', quantity: 0, unitPrice: 0}) {
            const row = invoiceTable.insertRow();

            const cellCode = row.insertCell(0);
            const cellName = row.insertCell(1);
            const cellCategory = row.insertCell(2);
            const cellQuantity = row.insertCell(3);
            const cellUnitPrice = row.insertCell(4);
            const cellTotal = row.insertCell(5);

            cellCode.innerHTML = `<input type='text' value='${item.code}' />`;
            cellName.innerHTML = `<input type='text' value='${item.name}' />`;
            cellCategory.innerHTML = `<select>${categories.map(category => `<option value="${category}"${category === item.category ? ' selected' : ''}>${category}</option>`).join('')}</select>`;
            cellQuantity.innerHTML = `<input type='number' value='${item.quantity}' min='0' step='1'/>`;
            cellUnitPrice.innerHTML = `<input type='number' value='${item.unitPrice}' min='0' step='0.01'/>`;
            cellTotal.innerHTML = `<span>${item.quantity * item.unitPrice}</span>`;

            [cellQuantity, cellUnitPrice].forEach(cell => {
                cell.getElementsByTagName('input')[0].addEventListener('input', updateTotal);
            });
        }

        function updateTotal() {
            let totalAmount = 0;

            Array.from(invoiceTable.rows).forEach(row => {
                const quantity = row.cells[3].getElementsByTagName('input')[0].valueAsNumber || 0;
                const unitPrice = row.cells[4].getElementsByTagName('input')[0].valueAsNumber || 0;
                const total = quantity * unitPrice;
                row.cells[5].getElementsByTagName('span')[0].textContent = total;
                totalAmount += total;
            });

            document.getElementById('totalAmount').textContent = totalAmount;
        }

        function addRow() {
            createRow();
            invoiceData.push({code: '', name: '', category: '', quantity: 0, unitPrice: 0});
            saveInvoiceData();
        }

        function removeRow(rowIndex) {
            invoiceTable.deleteRow(rowIndex);
            invoiceData.splice(rowIndex, 1);
            saveInvoiceData();
            updateTotal();
        }

        function saveInvoiceData() {
            localStorage.setItem('invoiceData', JSON.stringify(invoiceData));
        }

        function loadInvoiceData() {
            invoiceData.forEach(createRow);
        }

        document.getElementById('invoiceDate').textContent = new Date().toLocaleDateString();
        loadInvoiceData();
    </script>
</body>
</html>
