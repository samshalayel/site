<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاتورة المعدات</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .invoice-header { margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="invoice-header">
        <h2>فاتورة معدات الحاسوب</h2>
        <label for="company-name">اسم الشركة:</label>
        <input type="text" id="company-name" name="company-name"><br><br>
    </div>
    <table>
        <thead>
            <tr>
                <th>المنتج</th>
                <th>الكمية</th>
                <th>السعر</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><input type="text" name="product-name"></td>
                <td><input type="number" name="product-quantity" value="1"></td>
                <td><input type="text" name="product-price"></td>
            </tr>
            <!-- يمكن إضافة المزيد من الصفوف هنا حسب الحاجة -->
        </tbody>
    </table>
    <br>
    <button type="button">حفظ الفاتورة</button>
</body>
</html>
