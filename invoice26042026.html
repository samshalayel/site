<!DOCTYPE html>
<html rtl="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاتورة معدات حاسوب</title>
    <style>
        body { font-family: Arial, sans-serif; direction: rtl; margin: 0; padding: 0; background-color: #f4f4f9; color: #333; }
        .invoice-container { width: 80%; margin: auto; background: #fff; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { background: #4287f5; color: #fff; padding: 10px; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { padding: 10px; text-align: center; border: 1px solid #ddd; }
        th { background: #f8f8f8; }
        .total { text-align: left; font-weight: bold; }
        .add-row, .remove-row { cursor: pointer; color: #4287f5; }
        .hide { display: none; }
    </style>
</head>
<body>
    <div class="invoice-container">
        <h1>فاتورة معدات حاسوب</h1>
        <div>
            <label>اسم الشركة: <input type="text" id="companyName"></label>
            <label>هاتف: <input type="text" id="phone"></label>
            <label>بريد: <input type="email" id="email"></label>
            <label>عنوان: <input type="text" id="address"></label>
            <label>تاريخ: <input type="date" id="date"></label>
        </div>
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>الصنف</th>
                    <th>الفئة</th>
                    <th>الكمية</th>
                    <th>السعر</th>
                    <th>الإجمالي</th>
                    <th><span class="add-row">إضافة</span></th>
                </tr>
            </thead>
            <tbody id="invoiceBody">
                <tr>
                    <td>1</td>
                    <td><input type="text" class="item-name"></td>
                    <td><input type="text" class="category"></td>
                    <td><input type="number" class="quantity" value="1"></td>
                    <td><input type="number" class="price" value="0"></td>
                    <td class="line-total">0</td>
                    <td><span class="remove-row hide">حذف</span></td>
                </tr>
            </tbody>
        </table>
        <div>
            <label>الضريبة (%): <input type="number" id="taxRate" value="0"></label>
            <label>الخصم: <input type="number" id="discount" value="0"></label>
            <hr>
            <div>الإجمالي الكلي: <span id="grandTotal">0</span></div>
        </div>
        <button onclick="saveInvoice()">حفظ الفاتورة</button>
        <button onclick="printInvoice()">طباعة الفاتورة</button>
    </div>

    <script>
        document.querySelector('.add-row').addEventListener('click', function() {
            let tbody = document.getElementById('invoiceBody');
            let rows = tbody.getElementsByTagName('tr');
            let row = rows[rows.length - 1].cloneNode(true);
            let newRowNum = rows.length + 1;
            row.children[0].innerText = newRowNum;
            tbody.appendChild(row);
            updateRemoveRowVisibility();
            updateLineTotalForRow(row);
        });

        function updateRemoveRowVisibility() {
            let rows = document.getElementById('invoiceBody').rows;
            for (let i = 0; i < rows.length; i++) {
                if (rows.length > 1) {
                    rows[i].lastElementChild.firstElementChild.classList.remove('hide');
                } else {
                    rows[i].lastElementChild.firstElementChild.classList.add('hide');
                }
            }
        }

        document.getElementById('invoiceBody').addEventListener('input', function(e) {
            if (e.target.classList.contains('quantity') || e.target.classList.contains('price')) {
                updateLineTotalForRow(e.target.parentElement.parentElement);
            }
            updateGrandTotal();
        });

        document.getElementById('taxRate').addEventListener('input', updateGrandTotal);
        document.getElementById('discount').addEventListener('input', updateGrandTotal);

        document.getElementById('invoiceBody').addEventListener('click', function(e) {
            if (e.target.classList.contains('remove-row')) {
                e.target.parentElement.parentElement.remove();
                updateRemoveRowVisibility();
                updateGrandTotal();
            }
        });

        function updateLineTotalForRow(row) {
            let quantity = parseFloat(row.querySelector('.quantity').value);
            let price = parseFloat(row.querySelector('.price').value);
            let lineTotal = (quantity * price).toFixed(2);
            row.querySelector('.line-total').innerText = lineTotal;
        }

        function updateGrandTotal() {
            let rows = document.getElementById('invoiceBody').rows;
            let total = 0;
            for (let i = 0; i < rows.length; i++) {
                total += parseFloat(rows[i].querySelector('.line-total').innerText);
            }
            let taxRate = parseFloat(document.getElementById('taxRate').value);
            let discount = parseFloat(document.getElementById('discount').value);
            total += total * (taxRate / 100);
            total -= discount;
            document.getElementById('grandTotal').innerText = total.toFixed(2);
        }

        function saveInvoice() {
            let invoiceData = {
                company: document.getElementById('companyName').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                address: document.getElementById('address').value,
                date: document.getElementById('date').value,
                items: []
            };
            let rows = document.getElementById('invoiceBody').rows;
            for (let i = 0; i < rows.length; i++) {
                invoiceData.items.push({
                    itemName: rows[i].querySelector('.item-name').value,
                    category: rows[i].querySelector('.category').value,
                    quantity: parseFloat(rows[i].querySelector('.quantity').value),
                    price: parseFloat(rows[i].querySelector('.price').value),
                    total: parseFloat(rows[i].querySelector('.line-total').innerText)
                });
            }
            localStorage.setItem('invoice-data', JSON.stringify(invoiceData));
            alert('تم حفظ الفاتورة بنجاح!');
        }

        function printInvoice() {
            window.print();
        }

    </script>
</body>
</html>
