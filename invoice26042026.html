<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاتورة معدات حاسوب</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            direction: rtl;
        }
        .invoice {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            background-color: #f9f9f9;
        }
        .company-info {
            text-align: right;
            margin-bottom: 20px;
        }
        .invoice-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        .invoice-table th, .invoice-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: right;
        }
        .invoice-table th {
            background-color: #f2f2f2;
        }
        .total {
            text-align: right;
        }
        .buttons {
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="invoice">
        <div class="company-info">
            <h2>شركة معدات الحاسوب</h2>
            <p>هاتف: 123456789</p>
            <p>البريد الالكتروني: example@computerparts.com</p>
            <p>العنوان: شارع التكنولوجيا، المدينة</p>
            <p>التاريخ: <span id="invoice-date"></span></p>
        </div>
        <table class="invoice-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>الصنف</th>
                    <th>الوصف</th>
                    <th>الكمية</th>
                    <th>السعر</th>
                    <th>الإجمالي</th>
                </tr>
            </thead>
            <tbody id="invoice-items">
                <tr>
                    <td>1</td>
                    <td>شاشة</td>
                    <td>وصف الشاشة</td>
                    <td><input type="number" value="1" class="quantity"></td>
                    <td><input type="number" value="0" class="price"></td>
                    <td class="total">0</td>
                </tr>
            </tbody>
        </table>
        <div class="total">
            <p>الإجمالي الفرعي: <span id="subtotal">0</span></p>
            <p>الضريبة: <input type="number" value="5" id="tax">%</p>
            <p>الخصم: <input type="number" value="0" id="discount"></p>
            <p>الإجمالي الكلي: <span id="total">0</span></p>
        </div>
        <div class="buttons">
            <button onclick="addItem()">إضافة صنف</button>
            <button onclick="removeItem()">حذف صنف</button>
            <button onclick="saveInvoice()">حفظ الفاتورة</button>
            <button onclick="exportJSON()">تصدير JSON</button>
            <button onclick="printInvoice()">طباعة</button>
        </div>
    </div>
    <script>
        const invoiceItems = document.getElementById('invoice-items');
        const dateElement = document.getElementById('invoice-date');
        const subtotalElement = document.getElementById('subtotal');
        const totalElement = document.getElementById('total');
        
        function updateDate() {
            const now = new Date();
            dateElement.textContent = `${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()}`;
        }

        function calculateTotal() {
            let subtotal = 0;
            document.querySelectorAll('#invoice-items tr').forEach((row, index) => {
                const quantity = parseInt(row.querySelector('.quantity').value, 10);
                const price = parseFloat(row.querySelector('.price').value);
                const totalCell = row.querySelector('.total');
                const total = quantity * price;
                totalCell.textContent = total;
                subtotal += total;
            });
            subtotalElement.textContent = subtotal;
            const tax = parseFloat(document.getElementById('tax').value) || 0;
            const discount = parseFloat(document.getElementById('discount').value) || 0;
            const totalTax = subtotal * tax / 100;
            const total = subtotal + totalTax - discount;
            totalElement.textContent = total;
        }

        function addItem() {
            const rowCount = invoiceItems.rows.length + 1;
            const newRow = document.createElement('tr');
            newRow.innerHTML = `
                <td>${rowCount}</td>
                <td><input type="text" value="صنف جديد"></td>
                <td><input type="text" value=""></td>
                <td><input type="number" value="1" class="quantity"></td>
                <td><input type="number" value="0" class="price"></td>
                <td class="total">0</td>
            `;
            invoiceItems.appendChild(newRow);
        }

        function removeItem() {
            if (invoiceItems.rows.length > 1) {
                invoiceItems.deleteRow(invoiceItems.rows.length - 1);
            }
        }

        function saveInvoice() {
            const invoiceData = [];
            document.querySelectorAll('#invoice-items tr').forEach(row => {
                const item = {
                    product: row.cells[1].querySelector('input').value,
                    description: row.cells[2].querySelector('input').value,
                    quantity: row.cells[3].querySelector('input').value,
                    price: row.cells[4].querySelector('input').value,
                    total: row.cells[5].textContent
                };
                invoiceData.push(item);
            });
            window.localStorage.setItem('invoice', JSON.stringify(invoiceData));
        }

        function exportJSON() {
            const data = window.localStorage.getItem('invoice');
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'invoice.json';
            a.click();
        }

        function printInvoice() {
            window.print();
        }

        document.querySelectorAll('.quantity, .price, #tax, #discount').forEach(input => {
            input.addEventListener('input', calculateTotal);
        });

        updateDate();
        calculateTotal();
    </script>
</body>
</html>
